<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №4 - Валентин</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .log-box { margin-top: 20px; padding: 15px; background: #2d2d2d; color: #adff2f; border-radius: 5px; font-family: monospace; min-height: 100px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>Лабораторна робота №4</h1>
    <p><strong>Тема:</strong> Розробка бібліотек у JavaScript [cite: 2]</p>
    <p>Натисніть кнопку нижче, щоб запустити сортування масивів (100+ елементів). Результати детально виводяться в <strong>консоль (F12)</strong>.</p>
    
    <button id="runBtn">Запустити тести сортування</button>

    <div class="log-box" id="displayLog">Очікування запуску...</div>
</div>

<script src="sortLibrary.js"></script>
<script>
    document.getElementById('runBtn').addEventListener('click', function() {
        const logBox = document.getElementById('displayLog');
        logBox.innerHTML = "Тестування розпочато...\n";

        // Функція для створення випадкового масиву
        const createArray = (size) => Array.from({length: size}, () => Math.floor(Math.random() * 1000));

        // 1. Тест на нерозрідженому масиві (100+ елементів) [cite: 36]
        let normalArr = createArray(120);
        
        // 2. Тест на розрідженому масиві (100+ елементів) [cite: 37]
        let sparseArr = new Array(150);
        for(let i = 0; i < 40; i++) {
            let randomIdx = Math.floor(Math.random() * 150);
            sparseArr[randomIdx] = Math.floor(Math.random() * 1000);
        }

        const methods = ['bubbleSort', 'selectionSort', 'insertionSort', 'shellSort', 'quickSort'];
        
        console.clear();
        console.log("%c--- ТЕСТУВАННЯ БІБЛІОТЕКИ ---", "font-size: 20px; font-weight: bold;");

        logBox.innerHTML += "\n[1] ТЕСТ: НЕРОЗРІДЖЕНИЙ МАСИВ (120 елементів)\n";
        methods.forEach(m => {
            SortLib[m]([...normalArr], true);
            logBox.innerHTML += ` - ${m} виконано (див. консоль)\n`;
        });

        logBox.innerHTML += "\n[2] ТЕСТ: РОЗРІДЖЕНИЙ МАСИВ (150 елементів)\n";
        methods.forEach(m => {
            SortLib[m]([...sparseArr], false);
            logBox.innerHTML += ` - ${m} виконано (спадання, див. консоль)\n`;
        });

        logBox.innerHTML += "\nДемонстрацію завершено!";
    });
</script>

</body>
</html>
